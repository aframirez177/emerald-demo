name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite absolute paths for /emerald-demo subpath
        run: |
          # Rewrite root-absolute refs in HTML (href="/, src="/, content="/, data-*="/)
          find ./src \( -name "*.html" -o -name "*.xml" \) -type f \
            -exec sed -i 's|="/|="/emerald-demo/|g' {} +
          # Rewrite url("/ in CSS (font-face, backgrounds)
          find ./src -name "*.css" -type f \
            -exec sed -i 's|url("/|url("/emerald-demo/|g; s|url('\''/|url('\''/emerald-demo/|g' {} +
          # Rewrite absolute /assets/ string literals in JS (fallbacks, defaults)
          find ./src -name "*.js" -type f \
            -exec sed -i 's|"/assets/|"/emerald-demo/assets/|g' {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

      - id: deployment
        uses: actions/deploy-pages@v4
